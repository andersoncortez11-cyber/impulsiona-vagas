services:
  - type: web
    name: impulsiona-vagas
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: impulsiona-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: impulsiona-db
    plan: free
