<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Impulsiona Vagas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Bem-vindo de volta</h2>
      <p class="subtitle">Acesse sua conta para continuar</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Sua senha" required>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
          <label style="display:flex; align-items:center; gap:6px; font-size:0.85rem; cursor:pointer;">
            <input type="checkbox"> Lembrar de mim
          </label>
          <a href="#" style="font-size:0.85rem; color:var(--primary);">Esqueci minha senha</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
      </form>

      <div class="auth-divider">ou</div>

      <p style="text-align:center; font-size:0.9rem;">
        Não tem conta? <a href="register.html" style="color:var(--primary); font-weight:600;">Cadastre-se agora</a>
      </p>

      <div style="margin-top:1.5rem; padding:1rem; background:var(--bg); border-radius:var(--radius); font-size:0.8rem;">
        <strong>Contas de teste:</strong><br>
        Candidato: joao@email.com / 123456<br>
        Empresa: rh@techcorp.com / 123456<br>
        <em style="color:var(--text-muted);">Empresas criam suas vagas ao acessar "Nova Vaga" no painel.</em>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>`n  <script src="js/app.js"></script>
  <script>
    renderNavbar();
    const loggedIn = Auth.isLoggedIn();
    if (loggedIn) {
      const u = Auth.getUser();
      window.location.href = u.type === 'company' ? 'company-dashboard.html' : 'candidate-dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = Auth.login(email, password);
      if (result.success) {
        showToast('Login realizado com sucesso!', 'success');
        setTimeout(() => {
          window.location.href = result.user.type === 'company' ? 'company-dashboard.html' : 'candidate-dashboard.html';
        }, 500);
      } else {
        showToast(result.error, 'error');
      }
    }

    document.getElementById('login-form').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
