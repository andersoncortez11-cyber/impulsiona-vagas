<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificações - Impulsiona Vagas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar" id="navbar"></header>

  <section class="container" style="max-width:700px;">
    <div class="page-header">
      <h1>Notificações</h1>
      <button class="btn btn-outline btn-sm" onclick="markAllRead()">Marcar todas como lidas</button>
    </div>

    <div id="notifications-list"></div>
  </section>

  <script src="/socket.io/socket.io.js"></script>`n  <script src="js/app.js"></script>
  <script>
    renderNavbar();
    const user = Auth.getUser();
    if (!user) { window.location.href = 'login.html'; }

    function renderNotifications() {
      const notifs = Notifications.getByUser(user.id);
      const el = document.getElementById('notifications-list');
      if (notifs.length === 0) {
        el.innerHTML = `<div class="card card-body"><div class="empty-state"><div class="empty-icon">🔔</div><h3>Nenhuma notificação</h3></div></div>`;
        return;
      }
      el.innerHTML = notifs.map(n => `
        <div class="card" style="margin-bottom:8px; border-left:4px solid ${n.read ? 'var(--border)' : 'var(--primary)'};">
          <div class="card-body" style="display:flex; align-items:center; justify-content:space-between;">
            <div style="display:flex; align-items:center; gap:12px;">
              <span style="font-size:1.2rem;">${n.read ? '🔔' : '🔴'}</span>
              <div>
                <p style="font-size:0.9rem;">${n.text}</p>
                <span style="font-size:0.75rem; color:var(--text-muted);">${timeAgo(n.createdAt)}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function markAllRead() {
      Notifications.markAllRead(user.id);
      renderNotifications();
      renderNavbar();
      showToast('Notificações marcadas como lidas', 'success');
    }

    renderNotifications();
  </script>
</body>
</html>
